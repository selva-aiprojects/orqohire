<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9" />
      <stop offset="100%" stop-color="#2563EB" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#60A5FA" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background rounded hexagon/card -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="#0B132B" />
  <rect x="40" y="40" width="432" height="432" rx="104" fill="url(#grad)" opacity="0.95" />

  <!-- Outer orbital ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#FFFFFF" stroke-width="24" stroke-linecap="round" stroke-dasharray="620 200" transform="rotate(-45 256 256)" />

  <!-- Inner core & network dots -->
  <circle cx="256" cy="256" r="80" fill="#0B132B" />
  <circle cx="256" cy="256" r="48" fill="url(#innerGrad)" filter="url(#glow)" />
  <circle cx="256" cy="256" r="28" fill="#FFFFFF" />

  <!-- Connected satellite nodes -->
  <circle cx="360" cy="152" r="22" fill="#FFFFFF" shadow="0 0 10px #fff" />
  <circle cx="152" cy="360" r="22" fill="#FFFFFF" />
  <line x1="344" y1="168" x2="304" y2="208" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" />
  <line x1="168" y1="344" x2="208" y2="304" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" />
</svg>
